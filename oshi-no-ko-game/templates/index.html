<!DOCTYPE html>
<html>
<head>
    <title>Oshi no Ko Guessing Game</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #1a1a1a, #2c003e);
            color: white;
        }
        .box {
            margin-top: 80px;
        }
        input, button {
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }
        button {
            background: hotpink;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: deeppink;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🎭 Oshi no Ko Guessing Game</h1>

    <form method="POST">
        <input type="text" name="guess" placeholder="Enter character name" required>
        <br>
        <button type="submit">Guess</button>
    </form>

    <h2>{{ message }}</h2>
    <h3 style="color: lightblue;">{{ hint }}</h3>
</div>

</body>
</html>
